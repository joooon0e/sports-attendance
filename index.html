<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>스포츠클럽 출석체크</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: white;
      padding: 18px 20px;
      text-align: center;
    }
    .header h1 { font-size: 22px; margin-bottom: 4px; }
    .header .date-info { font-size: 15px; opacity: 0.85; }

    /* 브레드크럼 */
    .breadcrumb {
      background: white;
      padding: 10px 16px;
      font-size: 14px;
      color: #888;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .breadcrumb span { color: #1a73e8; cursor: pointer; }
    .breadcrumb span:hover { text-decoration: underline; }

    /* 스텝 공통 */
    .step { padding: 20px; max-width: 900px; margin: 0 auto; }
    .step-title {
      font-size: 20px;
      font-weight: bold;
      color: #333;
      margin-bottom: 16px;
      text-align: center;
    }

    /* 세션 선택 버튼 */
    .session-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    .session-btn {
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      padding: 30px 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .session-btn .time-badge {
      display: inline-block;
      background: #f0f4f8;
      color: #666;
      font-size: 13px;
      font-weight: normal;
      padding: 3px 10px;
      border-radius: 12px;
      margin-top: 8px;
    }
    .session-btn.morning { border-color: #ff8f00; }
    .session-btn.morning:hover { background: #fff8e1; }
    .session-btn.lunch { border-color: #43a047; }
    .session-btn.lunch:hover { background: #e8f5e9; }
    .session-btn.after { border-color: #7b1fa2; }
    .session-btn.after:hover { background: #f3e5f5; }

    /* 종목 선택 버튼 */
    .club-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }
    .club-btn {
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: 14px;
      padding: 22px 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      color: #333;
    }
    .club-btn:hover { background: #e8f0fe; border-color: #1a73e8; }
    .club-btn .count-badge {
      display: block;
      font-size: 12px;
      color: #888;
      font-weight: normal;
      margin-top: 6px;
    }

    /* 학생 버튼 */
    .student-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .student-btn {
      background: white;
      border: 3px solid #e0e0e0;
      border-radius: 14px;
      padding: 16px 10px;
      font-size: 19px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .student-btn .sub { font-size: 12px; color: #999; font-weight: normal; }
    .student-btn:active { transform: scale(0.96); }
    .student-btn.checked {
      background: #e8f5e9;
      border-color: #4caf50;
      color: #2e7d32;
    }
    .student-btn.checked .check-label { font-size: 12px; color: #4caf50; }

    /* 카운트 바 */
    .count-bar {
      text-align: center;
      padding: 10px;
      font-size: 15px;
      color: #555;
      background: white;
      border-bottom: 1px solid #eee;
      margin-bottom: 0;
    }
    .count-bar span { color: #1a73e8; font-weight: bold; }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #323232;
      color: white;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .admin-link {
      position: fixed;
      top: 14px;
      right: 16px;
      background: rgba(255,255,255,0.25);
      color: white;
      border: none;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
    }

    .loading { text-align: center; padding: 60px; font-size: 18px; color: #888; }
    .empty-msg { text-align: center; padding: 40px; font-size: 16px; color: #888; }

    @media (max-width: 600px) {
      .session-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>스포츠클럽 출석체크</h1>
  <div class="date-info" id="dateInfo"></div>
</div>

<div class="breadcrumb" id="breadcrumb">
  <span onclick="goStep(1)">시간대 선택</span>
</div>

<div id="countBarWrap"></div>

<!-- 스텝 1: 시간대 -->
<div class="step" id="step1">
  <div class="step-title">오늘 어떤 활동인가요?</div>
  <div class="session-grid">
    <button class="session-btn morning" onclick="selectSession('아침', 45)">
      🌅 아침 오아시스
      <span class="time-badge">45분</span>
    </button>
    <button class="session-btn lunch" onclick="selectSession('점심', 30)">
      ☀️ 점심 자율
      <span class="time-badge">30분</span>
    </button>
    <button class="session-btn after" onclick="selectSession('방과후', 45)">
      🌆 방과후 자율
      <span class="time-badge">45분</span>
    </button>
  </div>
</div>

<!-- 스텝 2: 종목 -->
<div class="step" id="step2" style="display:none">
  <div class="step-title">종목을 선택하세요</div>
  <div class="club-grid" id="clubGrid"></div>
</div>

<!-- 스텝 3: 학생 -->
<div class="step" id="step3" style="display:none">
  <div class="step-title" id="step3Title">이름을 터치하세요</div>
  <div class="student-grid" id="studentGrid"></div>
</div>

<!-- 취소 확인 팝업 -->
<div id="confirmOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;">
  <div style="background:white;border-radius:16px;padding:32px 28px;text-align:center;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <p id="confirmMsg" style="font-size:18px;font-weight:bold;color:#333;margin-bottom:24px;line-height:1.5"></p>
    <div style="display:flex;gap:12px;">
      <button id="confirmNo" style="flex:1;padding:14px;font-size:16px;border:2px solid #e0e0e0;border-radius:10px;background:white;cursor:pointer;color:#555;">아니요</button>
      <button id="confirmYes" style="flex:1;padding:14px;font-size:16px;border:none;border-radius:10px;background:#e53935;color:white;cursor:pointer;font-weight:bold;">취소하기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<button class="admin-link" onclick="location.href='admin.html'">관리자</button>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyCIMDXIw04shM23-VdEHWoS4nlCXiFcWk8",
    authDomain: "sports-attendance-a9adb.firebaseapp.com",
    databaseURL: "https://sports-attendance-a9adb-default-rtdb.firebaseio.com",
    projectId: "sports-attendance-a9adb",
    storageBucket: "sports-attendance-a9adb.firebasestorage.app",
    messagingSenderId: "524036192988",
    appId: "1:524036192988:web:12a896f149d55ea9db9219"
  });
  const db = firebase.database();

  const DAY_KEYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const today = new Date();
  const dayKey = DAY_KEYS[today.getDay()];
  const dateStr = today.toISOString().slice(0,10);
  const dayNames = ['일','월','화','수','목','금','토'];

  document.getElementById('dateInfo').textContent =
    `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${dayNames[today.getDay()]})`;

  let currentSession = null;
  let currentDuration = 0;
  let currentClub = null;
  let attendanceData = {};
  let allStudents = [];

  // 스텝 이동
  function goStep(n) {
    document.getElementById('step1').style.display = n === 1 ? 'block' : 'none';
    document.getElementById('step2').style.display = n === 2 ? 'block' : 'none';
    document.getElementById('step3').style.display = n === 3 ? 'block' : 'none';
    document.getElementById('countBarWrap').innerHTML = '';
    updateBreadcrumb(n);
  }

  function updateBreadcrumb(step) {
    const bc = document.getElementById('breadcrumb');
    if (step === 1) {
      bc.innerHTML = '<span>시간대 선택</span>';
    } else if (step === 2) {
      bc.innerHTML = `<span onclick="goStep(1)">시간대 선택</span> › <b>${currentSession}</b>`;
    } else {
      bc.innerHTML = `<span onclick="goStep(1)">시간대 선택</span> › <span onclick="goStep(2)">${currentSession}</span> › <b>${currentClub}</b>`;
    }
  }

  // 스텝 1: 시간대 선택
  async function selectSession(session, duration) {
    currentSession = session;
    currentDuration = duration;
    goStep(2);
    await loadClubs();
  }

  // 스텝 2: 종목 로드 (아침/점심/방과후 모두 동일한 목록)
  async function loadClubs() {
    const grid = document.getElementById('clubGrid');
    grid.innerHTML = '<div class="loading">불러오는 중...</div>';

    // 학생 목록 로드
    const studentsSnap = await db.ref('/students').once('value');
    allStudents = studentsSnap.val()
      ? Object.entries(studentsSnap.val()).map(([id,s]) => ({id,...s}))
      : [];

    // 학생 DB에서 모든 종목 자동 추출
    const rawClubs = [...new Set(allStudents.map(s => s.club).filter(Boolean))].sort();
    const clubSet = new Set(rawClubs);

    // 남+여 합반 옵션 자동 추가
    const combined = [];
    if (clubSet.has('배구부(남)') && clubSet.has('배구부(여)')) combined.push('배구부(남+여)');
    if (clubSet.has('축구부(남)') && clubSet.has('축구부(여)')) combined.push('축구부(남+여)');

    const clubs = [...rawClubs, ...combined];

    if (!clubs.length) {
      grid.innerHTML = '<div class="empty-msg">등록된 종목이 없어요.</div>';
      return;
    }

    grid.innerHTML = '';
    clubs.forEach(club => {
      const count = getStudentsForClub(club).length;
      const btn = document.createElement('button');
      btn.className = 'club-btn';
      btn.innerHTML = `${club}<span class="count-badge">${count}명</span>`;
      btn.onclick = () => selectClub(club);
      grid.appendChild(btn);
    });
  }

  // 스텝 3: 학생 선택
  async function selectClub(club) {
    currentClub = club;
    goStep(3);
    document.getElementById('step3Title').textContent = `${club} — 이름을 터치하세요`;

    // 출석 데이터 로드
    const attSnap = await db.ref(`/attendance/${dateStr}/${currentSession}/${currentClub}`).once('value');
    attendanceData = attSnap.val() || {};

    // 실시간 업데이트
    db.ref(`/attendance/${dateStr}/${currentSession}/${currentClub}`).on('value', snap => {
      attendanceData = snap.val() || {};
      renderStudents();
    });

    renderStudents();
  }

  function renderStudents() {
    // 모든 세션: 선택한 종목 학생만 표시 (남+여 합반 처리 포함)
    let students = getStudentsForClub(currentClub);

    students = [...students].sort((a,b) => {
      if (a.grade !== b.grade) return Number(a.grade) - Number(b.grade);
      if (a.class !== b.class) return Number(a.class) - Number(b.class);
      return Number(a.number) - Number(b.number);
    });

    const checkedCount = Object.keys(attendanceData).length;
    document.getElementById('countBarWrap').innerHTML =
      `<div class="count-bar">오늘 <b>${currentSession} ${currentClub}</b> 출석 <span>${checkedCount}</span> / ${students.length}명</div>`;

    const grid = document.getElementById('studentGrid');
    grid.innerHTML = '';

    if (!students.length) {
      grid.innerHTML = '<div class="empty-msg">등록된 학생이 없어요.</div>';
      return;
    }

    students.forEach(student => {
      const checked = !!attendanceData[student.id];
      const btn = document.createElement('button');
      btn.className = 'student-btn' + (checked ? ' checked' : '');
      btn.innerHTML = `
        <span>${student.name}</span>
        <span class="sub">${student.grade}학년 ${student.class}반 ${student.number}번</span>
        ${checked ? '<span class="check-label">✓ 출석완료</span>' : ''}
      `;
      btn.onclick = () => checkAttendance(student);
      grid.appendChild(btn);
    });
  }

  // 종목명 → 클럽명 변환 (점심/방과후용: "배구(남)" → "배구부(남)")
  function sportToClub(sport) {
    // 이미 "부"가 붙어있으면 그대로
    if (sport.includes('부')) return sport;
    // 성별 괄호가 있는 경우: "배구(남)" → "배구부(남)"
    const match = sport.match(/^(.+?)(\(.+\))?$/);
    if (match) {
      return match[1] + '부' + (match[2] || '');
    }
    return sport + '부';
  }

  // 종목/클럽 이름으로 학생 필터링 (남+여 합반 처리 포함)
  function getStudentsForClub(clubName) {
    // 클럽명으로 변환
    const name = sportToClub(clubName);

    if (name.includes('+')) {
      const match = name.match(/^(.+?)\((.+)\)$/);
      if (match) {
        const prefix = match[1];
        const variants = match[2].split('+');
        return allStudents.filter(s =>
          variants.some(v => s.club === `${prefix}(${v})`)
        );
      }
    }
    return allStudents.filter(s => s.club === name);
  }

  function checkAttendance(student) {
    if (attendanceData[student.id]) {
      // 이미 출석한 경우 취소 확인
      showConfirm(
        `${student.name} 학생의 출석을 취소할까요?`,
        () => {
          db.ref(`/attendance/${dateStr}/${currentSession}/${currentClub}/${student.id}`).remove()
            .then(() => showToast(`${student.name} 출석이 취소됐어요.`));
        }
      );
      return;
    }
    const record = {
      name: student.name,
      grade: student.grade,
      class: student.class,
      number: student.number,
      club: student.club || currentClub,
      sport: currentClub,
      session: currentSession,
      duration: currentDuration,
      timestamp: firebase.database.ServerValue.TIMESTAMP,
      date: dateStr
    };
    db.ref(`/attendance/${dateStr}/${currentSession}/${currentClub}/${student.id}`).set(record)
      .then(() => showToast(`✓ ${student.name} 출석 완료!`));
  }

  // 취소 확인 팝업
  function showConfirm(msg, onConfirm) {
    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmMsg').textContent = msg;
    overlay.style.display = 'flex';
    document.getElementById('confirmYes').onclick = () => {
      overlay.style.display = 'none';
      onConfirm();
    };
    document.getElementById('confirmNo').onclick = () => {
      overlay.style.display = 'none';
    };
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
